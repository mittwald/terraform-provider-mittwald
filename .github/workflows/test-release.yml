name: Test Release

on:
  pull_request:
    paths:
      - .goreleaser.yml
  push:
    branches:
      - master
    paths:
      - .goreleaser.yml

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8ade135a41bc03ea155e62e844d188df1ea18608 # v4.1.0
        with:
          # Allow goreleaser to access older tag information.
          fetch-depth: 0
      - uses: actions/setup-go@93397bea11091df50f3d7e59dc26a7711a8bcfbe # v4.1.0
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install syft
        run: |
          wget https://github.com/anchore/syft/releases/download/v1.42.4/syft_1.42.4_linux_amd64.deb
          sudo dpkg -i syft_1.42.4_linux_amd64.deb
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@7ec5c2b0c6cdda6e8bbb49444bc797dd33d74dd8 # v5.0.0
        with:
          args: check
          version: '~> v2'
